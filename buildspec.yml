version: 0.2

# Set ECR_URI and ECR_REPO_NAME as environment variables on the
# CodeBuild project itself (Console -> CodeBuild project -> Edit -> Environment).
# Example:
#   ECR_URI       = 123456789012.dkr.ecr.us-east-1.amazonaws.com/studenthub-app
#   ECR_REPO_NAME = studenthub-app
#   AWS_REGION    = us-east-1

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t $ECR_REPO_NAME:$IMAGE_TAG .
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
      - docker tag $ECR_REPO_NAME:$IMAGE_TAG $ECR_URI:latest

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest
      - echo Writing imagedefinitions.json for the ECS deploy stage...
      - printf '[{"name":"studenthub-container","imageUri":"%s"}]' $ECR_URI:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
